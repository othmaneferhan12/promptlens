<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Critical inline CSS: prevents FOUC before bundle loads -->
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
      body{background-color:#080810;color:#f5f5ff;font-family:Inter,system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
      #root{min-height:100vh}
    </style>

    <!-- Primary SEO -->
    <title>Image to Prompt Generator — Free AI Prompts for Midjourney, Flux & More | ImageToPrompt</title>
    <meta name="description" content="Upload any image and get optimized AI prompts for Midjourney, Stable Diffusion, Flux, DALL-E 3, Firefly, Leonardo & Ideogram. Free, no login, 10 analyses/day." />
    <meta name="theme-color" content="#080810" />
    <link rel="canonical" href="https://imagetoprompt.dev/" />

    <!-- Open Graph -->
    <meta property="og:title" content="ImageToPrompt — Free AI Prompt Generator from Any Image" />
    <meta property="og:description" content="Turn any photo into a perfect AI image prompt in seconds. Supports Midjourney, Stable Diffusion, Flux, DALL-E 3 and more. Free forever." />
    <meta property="og:url" content="https://imagetoprompt.dev" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ImageToPrompt" />
    <meta property="og:image" content="https://imagetoprompt.dev/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:image" content="https://imagetoprompt.dev/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ImageToPrompt — Free AI Prompt Generator" />
    <meta name="twitter:description" content="Upload any image → get perfect AI prompts for Midjourney, Flux, DALL-E 3 and more. Free, no login." />

    <!-- WebApplication Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "ImageToPrompt",
      "url": "https://imagetoprompt.dev",
      "description": "Free AI tool that generates optimized prompts for Midjourney, Stable Diffusion, Flux, DALL-E 3, Adobe Firefly, Leonardo AI, and Ideogram from any uploaded image.",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Web Browser",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "featureList": [
        "Midjourney prompt generator from image",
        "Stable Diffusion prompt with negative prompts",
        "Flux AI prompt generator",
        "DALL-E 3 prompt generator",
        "Color palette extraction",
        "Style and lighting analysis",
        "Creative remix prompts"
      ]
    }
    </script>

    <!-- HowTo Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "HowTo",
      "name": "How to Generate AI Prompts from Any Image",
      "description": "Turn any image into an optimized AI prompt for Midjourney, Stable Diffusion, Flux and more",
      "step": [
        {
          "@type": "HowToStep",
          "name": "Upload Your Image",
          "text": "Drag and drop any image or paste from clipboard. Accepts JPG, PNG, WEBP up to 5MB."
        },
        {
          "@type": "HowToStep",
          "name": "Select Your AI Model",
          "text": "Choose from Midjourney, Stable Diffusion, Flux, DALL-E 3, Firefly, Leonardo or Ideogram."
        },
        {
          "@type": "HowToStep",
          "name": "Get Your Prompt",
          "text": "Claude AI analyzes your image and generates a complete optimized prompt in seconds."
        }
      ]
    }
    </script>

    <!-- Self-hosted font preloads (same-origin, starts downloading immediately) -->
    <!-- Space Grotesk 700 is used for the LCP h1 heading -->
    <link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/space-grotesk-700.woff2" />
    <!-- Inter 400 is used for body text (FCP) -->
    <link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/inter-400.woff2" />

    <!-- Google Analytics (deferred until after page load) -->
    <script>
      window.addEventListener('load', function() {
        var s = document.createElement('script');
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-8QHDZQZD2L';
        s.async = true;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', 'G-8QHDZQZD2L');
      });
    </script>

    <!-- DNS prefetch for analytics (loaded after interaction) -->
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
    <link rel="dns-prefetch" href="https://www.google-analytics.com" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <!-- PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ImgToPrompt" />
  </head>
  <body>
    <div id="root">
      <!--
        Static pre-render shell — paints the LCP element (h1) before React loads.
        React will replace this content. Styles exactly match App.tsx hero layout.
        header: sticky, py-3 (24px) + h-8 content (32px) + border = 57px
        main:   max-w-5xl (64rem), px-4 (1rem) on mobile, no padding-top
      -->
      <div aria-hidden="true" style="min-height:100vh;background:#080810">
        <div style="height:57px;border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(8,8,16,0.8)"></div>
        <div style="max-width:64rem;margin:0 auto;padding:0 1rem 2.5rem">
          <div style="text-align:center">
            <h1 style="font-family:'Space Grotesk',Inter,system-ui,sans-serif;font-size:2.25rem;line-height:2.5rem;font-weight:700;color:#f5f5ff">
              Image To<span style="margin-left:0.5rem;background:linear-gradient(135deg,#e040fb,#00e5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Prompt</span>
            </h1>
            <p style="margin-top:0.75rem;font-family:Inter,system-ui,sans-serif;font-size:1rem;color:#8888bb;max-width:36rem;margin-left:auto;margin-right:auto;line-height:1.625">
              Upload any image. Get optimized prompts for Midjourney, Stable Diffusion, DALL·E, Flux, and more — instantly.
            </p>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
